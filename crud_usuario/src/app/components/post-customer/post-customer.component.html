<div class="container">
  <div class="form-container">
    <h2 class="form-title">Criar novo Usuário</h2>

    <form [formGroup]="postCustomerForm">
      <div class="form-group">
        <label for="nome"><strong>Nome:</strong></label>
        <input type="text" id="nome" name="nome" required formControlName="nome">
      </div>

      <div class="form-group">
        <label for="email"><strong>Email:</strong></label>
        <input type="email" id="email" name="email" required formControlName="email">
      </div>

      <div class="form-group">
        <label for="telefone"><strong>Telefone:</strong></label>
        <input type="tel" id="telefone" name="telefone" required formControlName="telefone">
      </div>
      <button type="submit" (click)="postCustomer()">Criar</button>
    </form>
  </div>
</div>
